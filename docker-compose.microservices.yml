x-observability-env: &observability-env
  LOG_LEVEL: INFO
  OBS_TRACING_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318

services:
  postgres:
    image: postgres:18-alpine
    container_name: anexi_ms_postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: louaiouni05062001
      POSTGRES_DB: anexi
    volumes:
      - postgres_ms_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anexi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anexi_ms_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_ms_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-migrate:
    build:
      context: ./anexi-backend
      dockerfile: Dockerfile
    container_name: anexi_ms_migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:louaiouni05062001@postgres:5432/anexi
      <<: *observability-env
      OTEL_SERVICE_NAME: db-migrate
    volumes:
      - ./anexi-backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: python scripts/migrate_safe.py

  auth-service:
    build:
      context: ./anexi-backend
      dockerfile: Dockerfile
    container_name: anexi_auth_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:louaiouni05062001@postgres:5432/anexi
      FRONTEND_BASE_URL: http://localhost:8080
      SECRET_KEY: anexi-super-secret-key-change-in-production-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      <<: *observability-env
      OTEL_SERVICE_NAME: auth-service
    volumes:
      - ./anexi-backend:/app
      - ./microservices:/app/microservices
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    command: uvicorn microservices.services.auth_service.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  orders-service:
    build:
      context: ./anexi-backend
      dockerfile: Dockerfile
    container_name: anexi_orders_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:louaiouni05062001@postgres:5432/anexi
      SECRET_KEY: anexi-super-secret-key-change-in-production-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      <<: *observability-env
      OTEL_SERVICE_NAME: orders-service
    volumes:
      - ./anexi-backend:/app
      - ./microservices:/app/microservices
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    command: uvicorn microservices.services.orders_service.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  trust-service:
    build:
      context: ./anexi-backend
      dockerfile: Dockerfile
    container_name: anexi_trust_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:louaiouni05062001@postgres:5432/anexi
      SECRET_KEY: anexi-super-secret-key-change-in-production-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      <<: *observability-env
      OTEL_SERVICE_NAME: trust-service
    volumes:
      - ./anexi-backend:/app
      - ./microservices:/app/microservices
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    command: uvicorn microservices.services.trust_service.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  analytics-service:
    build:
      context: ./anexi-backend
      dockerfile: Dockerfile
    container_name: anexi_analytics_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:louaiouni05062001@postgres:5432/anexi
      SECRET_KEY: anexi-super-secret-key-change-in-production-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      <<: *observability-env
      OTEL_SERVICE_NAME: ai-service
    volumes:
      - ./anexi-backend:/app
      - ./microservices:/app/microservices
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    command: uvicorn microservices.services.analytics_service.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  payments-service:
    build:
      context: ./anexi-backend
      dockerfile: Dockerfile
    container_name: anexi_payments_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:louaiouni05062001@postgres:5432/anexi
      SECRET_KEY: anexi-super-secret-key-change-in-production-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ANALYTICS_INTERNAL_URL: http://analytics-service:8000/internal/events
      <<: *observability-env
      OTEL_SERVICE_NAME: payments-service
    volumes:
      - ./anexi-backend:/app
      - ./microservices:/app/microservices
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    command: uvicorn microservices.services.payments_service.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./anexi-backend
      dockerfile: Dockerfile
    container_name: anexi_ms_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:louaiouni05062001@postgres:5432/anexi
      SECRET_KEY: anexi-super-secret-key-change-in-production-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      WORKER_METRICS_PORT: 9100
      CELERY_METRICS_QUEUES: celery
      <<: *observability-env
      OTEL_SERVICE_NAME: celery-worker
    volumes:
      - ./anexi-backend:/app
      - ./microservices:/app/microservices
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --pool=solo
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9100/metrics', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./anexi-backend
      dockerfile: Dockerfile
    container_name: anexi_api_gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8000
      ORDERS_SERVICE_URL: http://orders-service:8000
      PAYMENTS_SERVICE_URL: http://payments-service:8000
      ANALYTICS_SERVICE_URL: http://analytics-service:8000
      AI_SERVICE_URL: http://analytics-service:8000
      TRUST_SERVICE_URL: http://trust-service:8000
      <<: *observability-env
      OTEL_SERVICE_NAME: api-gateway
    volumes:
      - ./anexi-backend:/app
      - ./microservices:/app/microservices
    depends_on:
      auth-service:
        condition: service_healthy
      orders-service:
        condition: service_healthy
      payments-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      trust-service:
        condition: service_healthy
    command: uvicorn microservices.gateway.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: anexi_jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: anexi_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: anexi_cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: anexi_prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      api-gateway:
        condition: service_healthy
      worker:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.1.4
    container_name: anexi_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

  frontend:
    image: nginx:alpine
    container_name: anexi_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres_ms_data:
  redis_ms_data:
  prometheus_data:
  grafana_data:
