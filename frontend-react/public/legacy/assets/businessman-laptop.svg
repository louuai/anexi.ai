      <stop offset="1" stop-color="#12334A"/>
    </linearGradient>
    <radialGradient id="spot" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 330) rotate(90) scale(300 420)">
      <stop stop-color="#53D5FF" stop-opacity="0.35"/>
