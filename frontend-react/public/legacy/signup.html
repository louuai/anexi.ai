<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Anexi.ai</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 2rem;
        }

        .auth-container {
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .auth-card {
            background: var(--surface-glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 3rem;
            box-shadow: var(--shadow-3d-lg);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            font-size: 1.75rem;
            font-weight: 800;
        }

        .auth-logo svg {
            filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.5));
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--text-primary), var(--aurora-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .signup-progress {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
        }

        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            transition: var(--transition-smooth);
        }

        .step-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .progress-step.active .step-number {
            background: linear-gradient(135deg, var(--primary), var(--aurora-purple));
            border-color: transparent;
            color: white;
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
        }

        .progress-step.active .step-label {
            color: var(--primary-light);
        }

        .progress-line {
            flex: 1;
            height: 2px;
            background: var(--glass-border);
            margin: 0 0.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition-smooth);
            font-family: inherit;
        }

        .input-wrapper input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .password-strength {
            margin-top: 0.5rem;
        }

        .strength-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            background: var(--text-muted);
            transition: all 0.3s ease;
        }

        .strength-text {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .radio-card {
            position: relative;
            cursor: pointer;
        }

        .radio-card input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .radio-content {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            text-align: center;
            transition: var(--transition-smooth);
        }

        .radio-card input[type="radio"]:checked+.radio-content {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.2);
        }

        .radio-card.selected .radio-content {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.2);
        }

        .radio-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .radio-label {
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .radio-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-submit,
        .btn-secondary {
            flex: 1;
            padding: 1rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary), var(--aurora-purple));
            color: white;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .checkbox-label {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .checkbox-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: var(--radius-md);
            transition: var(--transition-smooth);
        }

        .checkbox-card:has(input:checked) {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
        }

        .link {
            color: var(--primary-light);
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        .form-summary {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-summary h3 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .form-summary p {
            color: var(--text-secondary);
        }

        .form-divider {
            position: relative;
            text-align: center;
            margin: 1.5rem 0;
        }

        .form-divider::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: var(--glass-border);
        }

        .form-divider span {
            position: relative;
            background: var(--bg-primary);
            padding: 0 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .btn-social {
            width: 100%;
            padding: 0.875rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-secondary);
        }

        .link-primary {
            color: var(--primary-light);
            font-weight: 600;
            text-decoration: none;
        }

        .link-primary:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="auth-page">
    <!-- Aurora Background -->
    <div class="aurora-bg">
        <div class="aurora-blob aurora-blob-1"></div>
        <div class="aurora-blob aurora-blob-2"></div>
        <div class="aurora-blob aurora-blob-3"></div>
    </div>
    <div class="noise-overlay"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
                        <path d="M16 2L3 9L16 16L29 9L16 2Z" fill="#6366F1" />
                        <path d="M3 23L16 30L29 23V9L16 16V30" fill="#818CF8" opacity="0.6" />
                    </svg>
                    <span>Anexi.ai</span>
                </div>
                <h1>Create your account</h1>
                <p>Start your free 14-day trial. No credit card required.</p>
            </div>

            <!-- Multi-step Progress -->
            <div class="signup-progress">
                <div class="progress-step active" data-step="1">
                    <div class="step-number">1</div>
                    <div class="step-label">Account</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step" data-step="2">
                    <div class="step-number">2</div>
                    <div class="step-label">Business</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step" data-step="3">
                    <div class="step-number">3</div>
                    <div class="step-label">Complete</div>
                </div>
            </div>

            <form id="signupForm" class="auth-form">
                <!-- Step 1: Account Info -->
                <div class="form-step active" data-step="1">
                    <div class="form-group">
                        <label for="fullName">Full name</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email address</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                                </path>
                                <polyline points="22,6 12,13 2,6"></polyline>
                            </svg>
                            <input type="email" id="email" name="email" placeholder="you@company.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="password" name="password" placeholder="********" required>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar">
                                <div class="strength-fill"></div>
                            </div>
                            <span class="strength-text">Use 8+ characters with mix of letters & numbers</span>
                        </div>
                    </div>

                    <button type="button" class="btn-submit" onclick="nextStep(2)">
                        <span>Continue</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>

                <!-- Step 2: Business Info -->
                <div class="form-step" data-step="2">
                    <div class="form-group">
                        <label for="businessType">Business type</label>
                        <div class="radio-group">
                            <label class="radio-card">
                                <input type="radio" name="businessType" value="fb_ads" required>
                                <div class="radio-content">
                                    <div class="radio-icon" aria-hidden="true">
                                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                            <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                                            <path d="M3 8h18"></path>
                                            <circle cx="8" cy="13" r="1"></circle>
                                            <path d="M11 13h7"></path>
                                        </svg>
                                    </div>
                                    <div class="radio-label">Facebook Ads</div>
                                    <div class="radio-desc">Selling via Facebook/Instagram</div>
                                </div>
                            </label>
                            <label class="radio-card">
                                <input type="radio" name="businessType" value="shopify">
                                <div class="radio-content">
                                    <div class="radio-icon" aria-hidden="true">
                                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                            <path d="M6 7h15l-1.5 8H7.5L6 7z"></path>
                                            <path d="M6 7l-1-2H2"></path>
                                            <circle cx="9" cy="18" r="1.5"></circle>
                                            <circle cx="18" cy="18" r="1.5"></circle>
                                        </svg>
                                    </div>
                                    <div class="radio-label">Online Store</div>
                                    <div class="radio-desc">Shopify, WooCommerce</div>
                                </div>
                            </label>
                            <label class="radio-card">
                                <input type="radio" name="businessType" value="whatsapp">
                                <div class="radio-content">
                                    <div class="radio-icon" aria-hidden="true">
                                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                            <path d="M21 11a8 8 0 0 1-8 8H7l-4 3 1.5-4.5A8 8 0 1 1 21 11z"></path>
                                        </svg>
                                    </div>
                                    <div class="radio-label">WhatsApp</div>
                                    <div class="radio-desc">Direct messaging sales</div>
                                </div>
                            </label>
                            <label class="radio-card">
                                <input type="radio" name="businessType" value="mix">
                                <div class="radio-content">
                                    <div class="radio-icon" aria-hidden="true">
                                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                            <path d="M7 7h11l-3-3"></path>
                                            <path d="M17 17H6l3 3"></path>
                                            <path d="M18 7v5"></path>
                                            <path d="M6 12v5"></path>
                                        </svg>
                                    </div>
                                    <div class="radio-label">Multiple</div>
                                    <div class="radio-desc">Mix of channels</div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="form-buttons">
                        <button type="button" class="btn-secondary" onclick="prevStep(1)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                            <span>Back</span>
                        </button>
                        <button type="button" class="btn-submit" onclick="nextStep(3)">
                            <span>Continue</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Step 3: Terms & Submit -->
                <div class="form-step" data-step="3">
                    <div class="form-summary">
                        <h3>Almost there!</h3>
                        <p>Review your information and accept our terms to get started.</p>
                    </div>

                    <div class="form-group">
                        <label class="checkbox-label checkbox-card">
                            <input type="checkbox" name="terms" required>
                            <span>I agree to the <a href="#" class="link">Terms of Service</a> and <a href="#"
                                    class="link">Privacy Policy</a></span>
                        </label>
                    </div>

                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="newsletter">
                            <span>Send me tips and exclusive offers</span>
                        </label>
                    </div>

                    <div class="form-buttons">
                        <button type="button" class="btn-secondary" onclick="prevStep(2)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                            <span>Back</span>
                        </button>
                        <button type="submit" class="btn-submit">
                            <span class="btn-text">Create Account</span>
                            <div class="btn-loader" style="display: none;">
                                <div class="spinner"></div>
                            </div>
                        </button>
                    </div>
                </div>

                <div class="form-divider" style="margin-top: 2rem;">
                    <span>or</span>
                </div>

                <button type="button" class="btn-social" onclick="startGoogleAuth(event)">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    <span>Sign up with Google</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" class="link-primary">Sign in</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js?v=20260221-6"></script>
</body>

</html>
