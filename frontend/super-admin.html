<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin - Anexi.ai</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { margin: 0; background: #0b1220; color: #e2e8f0; font-family: "Space Grotesk", sans-serif; }
    .wrap { max-width: 1240px; margin: 0 auto; padding: 24px; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 24px; }
    .title { margin: 0; font-size: 2rem; }
    .actions { display: flex; gap: 10px; }
    .btn {
      border: 1px solid rgba(148,163,184,0.35); background: rgba(15,23,42,0.7); color: #e2e8f0;
      border-radius: 10px; padding: 10px 14px; cursor: pointer; font-weight: 600;
    }
    .btn:hover { background: rgba(30,41,59,0.9); }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; margin-bottom: 20px; }
    .card {
      background: linear-gradient(160deg, rgba(15,23,42,0.9), rgba(30,41,59,0.75));
      border: 1px solid rgba(148,163,184,0.25); border-radius: 14px; padding: 14px;
    }
    .k { color: #94a3b8; font-size: .85rem; text-transform: uppercase; letter-spacing: .04em; }
    .v { font-size: 1.8rem; font-weight: 800; margin-top: 6px; color: #f8fafc; }
    .tables { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .users-admin { margin-top: 14px; }
    .users-form {
      display: grid;
      grid-template-columns: 1.1fr 1.2fr .9fr 1fr auto;
      gap: 8px;
      margin-bottom: 10px;
    }
    .users-form input, .users-form select {
      background: rgba(15,23,42,0.7);
      border: 1px solid rgba(148,163,184,0.35);
      border-radius: 10px;
      color: #e2e8f0;
      padding: 10px;
    }
    .action-btn {
      border: 1px solid rgba(148,163,184,0.35);
      background: transparent;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      margin-right: 6px;
    }
    .action-btn:hover { background: rgba(30,41,59,0.9); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid rgba(148,163,184,0.2); font-size: .9rem; }
    th { color: #93c5fd; }
    .status { display: inline-block; padding: 2px 8px; border-radius: 999px; background: rgba(16,185,129,.15); color: #34d399; }
    .muted { color: #94a3b8; }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .tables { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1 class="title">Super Admin Panel</h1>
      <div class="actions">
        <button class="btn" id="goUserDashboard">User Dashboard</button>
        <button class="btn" id="refreshAdmin">Refresh</button>
        <button class="btn" id="logoutAdmin">Logout</button>
      </div>
    </div>

    <div class="grid">
      <div class="card"><div class="k">Users</div><div class="v" id="mUsers">0</div></div>
      <div class="card"><div class="k">Boutiques</div><div class="v" id="mBoutiques">0</div></div>
      <div class="card"><div class="k">Customers</div><div class="v" id="mCustomers">0</div></div>
      <div class="card"><div class="k">Orders</div><div class="v" id="mOrders">0</div></div>
      <div class="card"><div class="k">Payments</div><div class="v" id="mPayments">0</div></div>
      <div class="card"><div class="k">Revenue</div><div class="v" id="mRevenue">$0</div></div>
    </div>

    <div class="tables">
      <div class="card">
        <h3>Recent Users</h3>
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th></tr></thead>
          <tbody id="recentUsersBody"><tr><td colspan="4" class="muted">Loading...</td></tr></tbody>
        </table>
      </div>
      <div class="card">
        <h3>Recent Payments</h3>
        <table>
          <thead><tr><th>ID</th><th>User</th><th>Plan</th><th>Amount</th></tr></thead>
          <tbody id="recentPaymentsBody"><tr><td colspan="4" class="muted">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="card users-admin">
      <h3>Users CRUD</h3>
      <div class="users-form">
        <input id="newUserName" type="text" placeholder="Full name">
        <input id="newUserEmail" type="email" placeholder="Email">
        <input id="newUserPassword" type="text" placeholder="Password">
        <select id="newUserRole">
          <option value="user">user</option>
          <option value="admin">admin</option>
          <option value="founder">founder</option>
        </select>
        <button class="btn" id="createUserBtn">Create</button>
      </div>
      <table>
        <thead>
          <tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr>
        </thead>
        <tbody id="usersCrudBody">
          <tr><td colspan="5" class="muted">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/super-admin.js"></script>
</body>
</html>
