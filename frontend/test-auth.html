<!DOCTYPE html>
<html>

<head>
    <title>Test Auth API</title>
</head>

<body>
    <h1>Test /auth/me Endpoint</h1>
    <button onclick="testAuth()">Test Auth</button>
    <pre id="result"></pre>

    <script>
        async function testAuth() {
            const token = localStorage.getItem('token');
            const resultEl = document.getElementById('result');

            resultEl.textContent = 'Testing...\n';
            resultEl.textContent += 'Token: ' + (token ? token.substring(0, 50) + '...' : 'NO TOKEN') + '\n\n';

            if (!token) {
                resultEl.textContent += 'ERROR: No token found in localStorage';
                return;
            }

            try {
                const response = await fetch('/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                resultEl.textContent += 'Status: ' + response.status + '\n';
                resultEl.textContent += 'Status Text: ' + response.statusText + '\n\n';

                const data = await response.json();
                resultEl.textContent += 'Response:\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                resultEl.textContent += 'ERROR: ' + error.message;
            }
        }
    </script>
</body>

</html>
